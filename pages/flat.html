<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flat UI Style</title>
  <link rel="stylesheet" href="../styles/flat.css">
</head>
<body>

<div class="page-header">
  <h1>Flat Design</h1>
  <p>Clean colors, no shadows, bold simplicity</p>
</div>

<div class="showcase">

  <!-- Primary Actions -->
  <div class="card">
    <h2>Primary Actions</h2>
    <div class="btn-row">
      <button class="btn btn-primary btn-md">Save Changes</button>
      <button class="btn btn-secondary btn-md">Confirm</button>
      <button class="btn btn-danger btn-md">Delete</button>
      <button class="btn btn-dark btn-md">Settings</button>
    </div>
  </div>

  <!-- Add Card Variants -->
  <div class="card">
    <h2>Add Card Buttons</h2>
    <div class="btn-row">
      <button class="btn btn-add btn-md">
        <span class="icon">＋</span> Add Card
      </button>
      <button class="btn btn-add-outline btn-md">
        <span class="icon">＋</span> Add Card
      </button>
      <button class="btn btn-ghost btn-md">
        <span class="icon">＋</span> Add Card
      </button>
      <button class="btn btn-add btn-pill btn-md">
        <span class="icon">＋</span> Add Card
      </button>
    </div>
  </div>

  <!-- Outline & Ghost -->
  <div class="card">
    <h2>Outline &amp; Ghost</h2>
    <div class="btn-row">
      <button class="btn btn-outline-primary btn-md">View Details</button>
      <button class="btn btn-ghost btn-md">Cancel</button>
      <button class="btn btn-outline-primary btn-md btn-pill">Explore</button>
      <button class="btn btn-ghost btn-md btn-pill">← Go Back</button>
    </div>
  </div>

  <!-- Sizes -->
  <div class="card">
    <h2>Sizes</h2>
    <div class="btn-row">
      <button class="btn btn-primary btn-sm">Small</button>
      <button class="btn btn-primary btn-md">Medium</button>
      <button class="btn btn-primary btn-lg">Large</button>
      <button class="btn btn-primary btn-sm btn-pill">
        <span class="icon">＋</span> Tag
      </button>
    </div>
  </div>

  <!-- Color Palette -->
  <div class="card">
    <h2>Color Palette</h2>
    <div class="btn-row">
      <button class="btn btn-teal btn-md">Teal Action</button>
      <button class="btn btn-orange btn-md">Orange Action</button>
      <button class="btn btn-purple btn-md">Purple Action</button>
      <button class="btn btn-secondary btn-md btn-pill">Success ✓</button>
      <button class="btn btn-danger btn-md btn-pill">Remove ✕</button>
    </div>
  </div>

  <!-- Icon Buttons -->
  <div class="card">
    <h2>Icon + Label</h2>
    <div class="btn-row">
      <button class="btn btn-primary btn-md">
        <span class="icon">↑</span> Upload
      </button>
      <button class="btn btn-dark btn-md">
        <span class="icon">⬇</span> Download
      </button>
      <button class="btn btn-secondary btn-md">
        <span class="icon">✉</span> Send
      </button>
      <button class="btn btn-outline-primary btn-md">
        <span class="icon">✎</span> Edit
      </button>
      <button class="btn btn-danger btn-md">
        <span class="icon">🗑</span> Delete
      </button>
    </div>
  </div>

</div>

<div style="text-align:center; margin-top:40px;">
  <a class="back-link" href="../index.html">← Back to Index</a>
</div>

</body>
</html>
