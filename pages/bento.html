<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bento UI Style</title>
  <link rel="stylesheet" href="../styles/bento.css">
</head>
<body>

<div class="page-header">
  <h1>Bento Design</h1>
  <p>Dark grid, neon accents, modular blocks</p>
</div>

<div class="showcase">

  <div class="card">
    <h2>Primary Actions</h2>
    <div class="btn-row">
      <button class="btn btn-white btn-md">Save</button>
      <button class="btn btn-accent btn-md">Confirm</button>
      <button class="btn btn-blue btn-md">Explore</button>
      <button class="btn btn-red btn-md">Delete</button>
      <button class="btn btn-dark-fill btn-md">Settings</button>
    </div>
  </div>

  <div class="card">
    <h2>Add Card Variants</h2>
    <div class="btn-row">
      <button class="btn btn-accent btn-lg">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-outline-accent btn-md">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-ghost btn-md">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-mono btn-md">
        <span class="icon">+</span> add_card()
      </button>
    </div>
  </div>

  <div class="card">
    <h2>Outlined</h2>
    <div class="btn-row">
      <button class="btn btn-outline-white btn-md">White</button>
      <button class="btn btn-outline-accent btn-md">Accent</button>
      <button class="btn btn-outline-blue btn-md">Blue</button>
      <button class="btn btn-ghost btn-md">Ghost</button>
    </div>
  </div>

  <div class="card">
    <h2>Color Palette</h2>
    <div class="btn-row">
      <button class="btn btn-accent btn-md">Emerald</button>
      <button class="btn btn-blue btn-md">Blue</button>
      <button class="btn btn-purple btn-md">Purple</button>
      <button class="btn btn-yellow btn-md">Amber</button>
      <button class="btn btn-orange btn-md">Orange</button>
      <button class="btn btn-red btn-md">Red</button>
    </div>
  </div>

  <div class="card">
    <h2>Pill &amp; Sizes</h2>
    <div class="btn-row">
      <button class="btn btn-accent btn-pill btn-sm">Small Tag</button>
      <button class="btn btn-blue btn-pill btn-md">Medium Pill</button>
      <button class="btn btn-white btn-pill btn-lg">Large Pill</button>
    </div>
  </div>

  <div class="card">
    <h2>Monospace / Code Style</h2>
    <div class="btn-row">
      <button class="btn btn-mono btn-md">run()</button>
      <button class="btn btn-mono btn-md">deploy()</button>
      <button class="btn btn-mono btn-md">build()</button>
      <button class="btn btn-mono btn-md">test()</button>
    </div>
  </div>

</div>

<div style="text-align:center; margin-top:40px;">
  <a class="back-link" href="../index.html">Back to Index</a>
</div>

</body>
</html>
