<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organic UI Style</title>
  <link rel="stylesheet" href="../styles/organic.css">
</head>
<body>

<div class="page-header">
  <h1>Organic Design</h1>
  <p>Blob shapes, earth tones, natural flow</p>
</div>

<div class="showcase">

  <div class="card">
    <h2>Primary Actions</h2>
    <div class="btn-row">
      <button class="btn btn-forest btn-md">Save</button>
      <button class="btn btn-sage btn-md">Explore</button>
      <button class="btn btn-sky btn-md">Share</button>
      <button class="btn btn-terra btn-md">Delete</button>
    </div>
  </div>

  <div class="card">
    <h2>Add Card Variants</h2>
    <div class="btn-row">
      <button class="btn btn-forest btn-lg">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-outline btn-md">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-ghost btn-md">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-sage btn-md">
        <span class="icon">+</span> New Card
      </button>
    </div>
  </div>

  <div class="card">
    <h2>Color Palette</h2>
    <div class="btn-row">
      <button class="btn btn-forest btn-md">Forest</button>
      <button class="btn btn-sage btn-md">Sage</button>
      <button class="btn btn-earth btn-md">Earth</button>
      <button class="btn btn-moss btn-md">Moss</button>
      <button class="btn btn-sky btn-md">Sky</button>
      <button class="btn btn-terra btn-md">Terra</button>
    </div>
  </div>

  <div class="card">
    <h2>Outline &amp; Ghost</h2>
    <div class="btn-row">
      <button class="btn btn-outline btn-md">Outlined</button>
      <button class="btn btn-ghost btn-md">Ghost</button>
      <button class="btn btn-outline btn-md">Cancel</button>
    </div>
  </div>

  <div class="card">
    <h2>Sizes</h2>
    <div class="btn-row">
      <button class="btn btn-forest btn-sm">Small</button>
      <button class="btn btn-forest btn-md">Medium</button>
      <button class="btn btn-forest btn-lg">Large</button>
    </div>
  </div>

  <div class="card">
    <h2>Icon + Label</h2>
    <div class="btn-row">
      <button class="btn btn-forest btn-md">
        <span class="icon">^</span> Upload
      </button>
      <button class="btn btn-sky btn-md">
        <span class="icon">@</span> Send
      </button>
      <button class="btn btn-sage btn-md">
        <span class="icon">*</span> Confirm
      </button>
      <button class="btn btn-earth btn-md">
        <span class="icon">/</span> Edit
      </button>
      <button class="btn btn-terra btn-md">
        <span class="icon">x</span> Remove
      </button>
    </div>
  </div>

</div>

<div style="text-align:center; margin-top:40px;">
  <a class="back-link" href="../index.html">Back to Index</a>
</div>

</body>
</html>
