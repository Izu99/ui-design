<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeuomorphism UI Style</title>
  <link rel="stylesheet" href="../styles/skeuomorphism.css">
</head>
<body>

<div class="page-header">
  <h1>Skeuomorphism</h1>
  <p>Glossy gradients, beveled edges, tactile surfaces</p>
</div>

<div class="showcase">

  <div class="card">
    <h2>Primary Actions</h2>
    <div class="btn-row">
      <button class="btn btn-metal btn-md">Default</button>
      <button class="btn btn-blue btn-md">Save</button>
      <button class="btn btn-green btn-md">Confirm</button>
      <button class="btn btn-red btn-md">Delete</button>
    </div>
  </div>

  <div class="card">
    <h2>Add Card Variants</h2>
    <div class="btn-row">
      <button class="btn btn-blue btn-lg">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-green btn-md">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-metal btn-md">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-blue btn-pill btn-md">
        <span class="icon">+</span> Add Card
      </button>
    </div>
  </div>

  <div class="card">
    <h2>Glossy Palette</h2>
    <div class="btn-row">
      <button class="btn btn-metal btn-md">Metal</button>
      <button class="btn btn-blue btn-md">Blue</button>
      <button class="btn btn-green btn-md">Green</button>
      <button class="btn btn-orange btn-md">Orange</button>
      <button class="btn btn-red btn-md">Red</button>
      <button class="btn btn-leather btn-md">Leather</button>
    </div>
  </div>

  <div class="card">
    <h2>Pill Shape</h2>
    <div class="btn-row">
      <button class="btn btn-metal btn-pill btn-md">Metal Pill</button>
      <button class="btn btn-blue btn-pill btn-md">Blue Pill</button>
      <button class="btn btn-green btn-pill btn-sm">Small</button>
    </div>
  </div>

  <div class="card">
    <h2>Sizes</h2>
    <div class="btn-row">
      <button class="btn btn-blue btn-sm">Small</button>
      <button class="btn btn-blue btn-md">Medium</button>
      <button class="btn btn-blue btn-lg">Large</button>
    </div>
  </div>

  <div class="card">
    <h2>Icon + Label</h2>
    <div class="btn-row">
      <button class="btn btn-blue btn-md">
        <span class="icon">^</span> Upload
      </button>
      <button class="btn btn-green btn-md">
        <span class="icon">@</span> Send
      </button>
      <button class="btn btn-metal btn-md">
        <span class="icon">/</span> Edit
      </button>
      <button class="btn btn-leather btn-md">
        <span class="icon">v</span> Export
      </button>
      <button class="btn btn-red btn-md">
        <span class="icon">x</span> Remove
      </button>
    </div>
  </div>

</div>

<div style="text-align:center; margin-top:40px;">
  <a class="back-link" href="../index.html">Back to Index</a>
</div>

</body>
</html>
