<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Material UI Style</title>
  <link rel="stylesheet" href="../styles/material.css">
</head>
<body>

<div class="page-header">
  <h1>Material Design</h1>
  <p>Elevation, ripple, purposeful motion</p>
</div>

<div class="showcase">

  <div class="card">
    <h2>Elevated Buttons</h2>
    <div class="btn-row">
      <button class="btn btn-primary btn-md">Contained</button>
      <button class="btn btn-secondary btn-md">Teal</button>
      <button class="btn btn-danger btn-md">Delete</button>
      <button class="btn btn-dark btn-md">Neutral</button>
    </div>
  </div>

  <div class="card">
    <h2>Add Card — FAB Variants</h2>
    <div class="btn-row">
      <button class="btn btn-fab">
        <span class="icon">＋</span> Add Card
      </button>
      <button class="btn-fab-mini" title="Add Card">＋</button>
      <button class="btn btn-tonal btn-md">
        <span class="icon">＋</span> Add Card
      </button>
      <button class="btn btn-outlined btn-md">
        <span class="icon">＋</span> Add Card
      </button>
    </div>
  </div>

  <div class="card">
    <h2>Outlined &amp; Text</h2>
    <div class="btn-row">
      <button class="btn btn-outlined btn-md">Outlined</button>
      <button class="btn btn-text btn-md">Text Button</button>
      <button class="btn btn-tonal btn-md">Tonal Blue</button>
      <button class="btn btn-tonal-green btn-md">Tonal Green</button>
    </div>
  </div>

  <div class="card">
    <h2>Sizes</h2>
    <div class="btn-row">
      <button class="btn btn-primary btn-sm">Small</button>
      <button class="btn btn-primary btn-md">Medium</button>
      <button class="btn btn-primary btn-lg">Large</button>
    </div>
  </div>

  <div class="card">
    <h2>Icon + Label</h2>
    <div class="btn-row">
      <button class="btn btn-primary btn-md">
        <span class="icon">↑</span> Upload
      </button>
      <button class="btn btn-secondary btn-md">
        <span class="icon">✉</span> Send
      </button>
      <button class="btn btn-outlined btn-md">
        <span class="icon">✎</span> Edit
      </button>
      <button class="btn btn-danger btn-md">
        <span class="icon">🗑</span> Remove
      </button>
      <button class="btn btn-text btn-md">
        <span class="icon">⬇</span> Export
      </button>
    </div>
  </div>

</div>

<div style="text-align:center; margin-top:40px;">
  <a class="back-link" href="../index.html">← Back to Index</a>
</div>

</body>
</html>
