<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism UI Style</title>
  <link rel="stylesheet" href="../styles/glass.css">
</head>
<body>

<div class="page-header">
  <h1>Glassmorphism</h1>
  <p>Frosted glass, blur, translucency</p>
</div>

<div class="showcase">

  <div class="card">
    <h2>Primary Actions</h2>
    <div class="btn-row">
      <button class="btn btn-glass-primary btn-md">Save</button>
      <button class="btn btn-glass-pink btn-md">Share</button>
      <button class="btn btn-glass-blue btn-md">Explore</button>
      <button class="btn btn-glass-danger btn-md">Delete</button>
    </div>
  </div>

  <div class="card">
    <h2>Add Card Variants</h2>
    <div class="btn-row">
      <button class="btn btn-add-glass btn-md">
        <span class="icon">＋</span> Add Card
      </button>
      <button class="btn btn-add-glass btn-lg">
        <span class="icon">＋</span> Add Card
      </button>
      <button class="btn btn-add-dashed btn-md">
        <span class="icon">＋</span> Add Card
      </button>
      <button class="btn btn-glass-outline btn-md">
        <span class="icon">＋</span> New Card
      </button>
    </div>
  </div>

  <div class="card">
    <h2>Glass &amp; Outline</h2>
    <div class="btn-row">
      <button class="btn btn-glass btn-md">Frosted</button>
      <button class="btn btn-glass-outline btn-md">Outlined</button>
      <button class="btn btn-glass btn-md">Cancel</button>
      <button class="btn btn-glass-outline btn-md">View All</button>
    </div>
  </div>

  <div class="card">
    <h2>Sizes</h2>
    <div class="btn-row">
      <button class="btn btn-glass-primary btn-sm">Small</button>
      <button class="btn btn-glass-primary btn-md">Medium</button>
      <button class="btn btn-glass-primary btn-lg">Large</button>
    </div>
  </div>

  <div class="card">
    <h2>Icon + Label</h2>
    <div class="btn-row">
      <button class="btn btn-glass-primary btn-md">
        <span class="icon">↑</span> Upload
      </button>
      <button class="btn btn-glass-blue btn-md">
        <span class="icon">⬇</span> Download
      </button>
      <button class="btn btn-glass-pink btn-md">
        <span class="icon">✉</span> Send
      </button>
      <button class="btn btn-glass-outline btn-md">
        <span class="icon">✎</span> Edit
      </button>
      <button class="btn btn-glass-danger btn-md">
        <span class="icon">🗑</span> Remove
      </button>
    </div>
  </div>

</div>

<div style="text-align:center; margin-top:40px;">
  <a class="back-link" href="../index.html">← Back to Index</a>
</div>

</body>
</html>
