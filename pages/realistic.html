<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realistic UI Style</title>
  <link rel="stylesheet" href="../styles/realistic.css">
</head>
<body>

<div class="page-header">
  <h1>Realistic Design</h1>
  <p>Deep shadows, material depth, iOS-inspired precision</p>
</div>

<div class="showcase">

  <div class="card">
    <h2>Primary Actions</h2>
    <div class="btn-row">
      <button class="btn btn-blue btn-md">Save</button>
      <button class="btn btn-green btn-md">Confirm</button>
      <button class="btn btn-orange btn-md">Proceed</button>
      <button class="btn btn-red btn-md">Delete</button>
    </div>
  </div>

  <div class="card">
    <h2>Add Card Variants</h2>
    <div class="btn-row">
      <button class="btn btn-blue btn-lg">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-outline btn-md">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-ghost btn-md">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-green btn-pill btn-md">
        <span class="icon">+</span> Add Card
      </button>
    </div>
  </div>

  <div class="card">
    <h2>Color Palette</h2>
    <div class="btn-row">
      <button class="btn btn-blue btn-md">Blue</button>
      <button class="btn btn-green btn-md">Green</button>
      <button class="btn btn-orange btn-md">Orange</button>
      <button class="btn btn-purple btn-md">Purple</button>
      <button class="btn btn-red btn-md">Red</button>
    </div>
  </div>

  <div class="card">
    <h2>Outline, Ghost &amp; Dark</h2>
    <div class="btn-row">
      <button class="btn btn-outline btn-md">Outlined</button>
      <button class="btn btn-dark btn-md">Surface</button>
      <button class="btn btn-ghost btn-md">Ghost</button>
    </div>
  </div>

  <div class="card">
    <h2>Pill Shape</h2>
    <div class="btn-row">
      <button class="btn btn-blue btn-pill btn-md">Blue Pill</button>
      <button class="btn btn-green btn-pill btn-md">Green Pill</button>
      <button class="btn btn-purple btn-pill btn-sm">Tag</button>
      <button class="btn btn-red btn-pill btn-sm">Remove</button>
    </div>
  </div>

  <div class="card">
    <h2>Sizes</h2>
    <div class="btn-row">
      <button class="btn btn-blue btn-sm">Small</button>
      <button class="btn btn-blue btn-md">Medium</button>
      <button class="btn btn-blue btn-lg">Large</button>
    </div>
  </div>

  <div class="card">
    <h2>Full Width</h2>
    <button class="btn btn-blue btn-full">
      <span class="icon">+</span> Add New Card
    </button>
    <br><br>
    <button class="btn btn-dark btn-full">Continue</button>
  </div>

  <div class="card">
    <h2>Icon + Label</h2>
    <div class="btn-row">
      <button class="btn btn-blue btn-md">
        <span class="icon">^</span> Upload
      </button>
      <button class="btn btn-green btn-md">
        <span class="icon">@</span> Share
      </button>
      <button class="btn btn-dark btn-md">
        <span class="icon">/</span> Edit
      </button>
      <button class="btn btn-purple btn-md">
        <span class="icon">v</span> Export
      </button>
      <button class="btn btn-red btn-md">
        <span class="icon">x</span> Remove
      </button>
    </div>
  </div>

</div>

<div style="text-align:center; margin-top:40px;">
  <a class="back-link" href="../index.html">Back to Index</a>
</div>

</body>
</html>
