<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphism UI Style</title>
  <link rel="stylesheet" href="../styles/neumorphism.css">
</head>
<body>

<div class="page-header">
  <h1>Neumorphism</h1>
  <p>Soft shadows, extruded surfaces, tactile depth</p>
</div>

<div class="showcase">

  <div class="card">
    <h2>Raised Buttons</h2>
    <div class="btn-row">
      <button class="btn btn-raised btn-md">Default</button>
      <button class="btn btn-accent btn-md">Primary</button>
      <button class="btn btn-green btn-md">Success</button>
      <button class="btn btn-danger btn-md">Delete</button>
    </div>
  </div>

  <div class="card">
    <h2>Add Card Variants</h2>
    <div class="btn-row">
      <button class="btn btn-accent btn-md">
        <span class="icon">＋</span> Add Card
      </button>
      <button class="btn btn-add-neu btn-md">
        <span class="icon">＋</span> Add Card
      </button>
      <button class="btn btn-raised btn-md">
        <span class="icon">＋</span> Add Card
      </button>
      <button class="btn btn-accent btn-pill btn-md">
        <span class="icon">＋</span> Add Card
      </button>
    </div>
  </div>

  <div class="card">
    <h2>Pressed (Inset)</h2>
    <div class="btn-row">
      <button class="btn btn-pressed btn-md">Active State</button>
      <button class="btn btn-pressed btn-md">Toggled On</button>
      <button class="btn btn-raised btn-md">Normal</button>
    </div>
  </div>

  <div class="card">
    <h2>Pill Shape</h2>
    <div class="btn-row">
      <button class="btn btn-raised btn-pill btn-md">Pill Button</button>
      <button class="btn btn-accent btn-pill btn-md">Accent Pill</button>
      <button class="btn btn-green btn-pill btn-md">Green Pill</button>
      <button class="btn btn-danger btn-pill btn-sm">Remove</button>
    </div>
  </div>

  <div class="card">
    <h2>Sizes</h2>
    <div class="btn-row">
      <button class="btn btn-accent btn-sm">Small</button>
      <button class="btn btn-accent btn-md">Medium</button>
      <button class="btn btn-accent btn-lg">Large</button>
    </div>
  </div>

  <div class="card">
    <h2>Icon + Label</h2>
    <div class="btn-row">
      <button class="btn btn-raised btn-md">
        <span class="icon">↑</span> Upload
      </button>
      <button class="btn btn-accent btn-md">
        <span class="icon">✉</span> Send
      </button>
      <button class="btn btn-green btn-md">
        <span class="icon">✓</span> Confirm
      </button>
      <button class="btn btn-danger btn-md">
        <span class="icon">🗑</span> Remove
      </button>
      <button class="btn btn-raised btn-md">
        <span class="icon">✎</span> Edit
      </button>
    </div>
  </div>

</div>

<div style="text-align:center; margin-top:40px;">
  <a class="back-link" href="../index.html">← Back to Index</a>
</div>

</body>
</html>
