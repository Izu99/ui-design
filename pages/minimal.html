<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal UI Style</title>
  <link rel="stylesheet" href="../styles/minimal.css">
</head>
<body>

<div class="page-header">
  <h1>Minimal Design</h1>
  <p>Whitespace, restraint, quiet confidence</p>
</div>

<div class="showcase">

  <div class="card">
    <h2>Solid</h2>
    <div class="btn-row">
      <button class="btn btn-black btn-md">Save</button>
      <button class="btn btn-gray btn-md">Cancel</button>
      <button class="btn btn-danger btn-md">Delete</button>
    </div>
  </div>

  <div class="card">
    <h2>Add Card Variants</h2>
    <div class="btn-row">
      <button class="btn btn-black btn-md">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-outline btn-md">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-dashed btn-md">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-ghost btn-md">
        <span class="icon">+</span> Add Card
      </button>
    </div>
  </div>

  <div class="card">
    <h2>Outline &amp; Ghost</h2>
    <div class="btn-row">
      <button class="btn btn-outline btn-md">Outlined</button>
      <button class="btn btn-ghost btn-md">Ghost</button>
      <button class="btn btn-underline btn-md">Underline</button>
    </div>
  </div>

  <div class="card">
    <h2>Pill</h2>
    <div class="btn-row">
      <button class="btn btn-black btn-pill btn-md">Save</button>
      <button class="btn btn-outline btn-pill btn-md">Cancel</button>
      <button class="btn btn-gray btn-pill btn-md">Filter</button>
      <button class="btn btn-black btn-pill btn-sm">Tag</button>
    </div>
  </div>

  <div class="card">
    <h2>Sizes</h2>
    <div class="btn-row">
      <button class="btn btn-black btn-sm">Small</button>
      <button class="btn btn-black btn-md">Medium</button>
      <button class="btn btn-black btn-lg">Large</button>
    </div>
  </div>

  <div class="card">
    <h2>Icon + Label</h2>
    <div class="btn-row">
      <button class="btn btn-black btn-md">
        <span class="icon">^</span> Upload
      </button>
      <button class="btn btn-outline btn-md">
        <span class="icon">/</span> Edit
      </button>
      <button class="btn btn-ghost btn-md">
        <span class="icon">@</span> Share
      </button>
      <button class="btn btn-danger btn-md">
        <span class="icon">x</span> Remove
      </button>
      <button class="btn btn-underline btn-md">
        <span class="icon">v</span> Export
      </button>
    </div>
  </div>

</div>

<div style="text-align:center; margin-top:60px;">
  <a class="back-link" href="../index.html">Back to Index</a>
</div>

</body>
</html>
