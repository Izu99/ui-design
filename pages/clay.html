<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clay UI Style</title>
  <link rel="stylesheet" href="../styles/clay.css">
</head>
<body>

<div class="page-header">
  <h1>Clay Design</h1>
  <p>Puffy, inflated, soft 3D buttons with depth</p>
</div>

<div class="showcase">

  <div class="card">
    <h2>Primary Actions</h2>
    <div class="btn-row">
      <button class="btn btn-pink btn-md">Save</button>
      <button class="btn btn-purple btn-md">Explore</button>
      <button class="btn btn-mint btn-md">Confirm</button>
      <button class="btn btn-red btn-md">Delete</button>
    </div>
  </div>

  <div class="card">
    <h2>Add Card Variants</h2>
    <div class="btn-row">
      <button class="btn btn-add-clay">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-purple btn-pill btn-md">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-outline btn-md">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-yellow btn-md">
        <span class="icon">+</span> Add Card
      </button>
    </div>
  </div>

  <div class="card">
    <h2>Color Palette</h2>
    <div class="btn-row">
      <button class="btn btn-pink btn-md">Pink</button>
      <button class="btn btn-purple btn-md">Purple</button>
      <button class="btn btn-blue btn-md">Blue</button>
      <button class="btn btn-mint btn-md">Mint</button>
      <button class="btn btn-peach btn-md">Peach</button>
      <button class="btn btn-yellow btn-md">Yellow</button>
    </div>
  </div>

  <div class="card">
    <h2>Pill Shape</h2>
    <div class="btn-row">
      <button class="btn btn-pink btn-pill btn-md">Pink Pill</button>
      <button class="btn btn-blue btn-pill btn-md">Blue Pill</button>
      <button class="btn btn-mint btn-pill btn-md">Mint Pill</button>
      <button class="btn btn-peach btn-pill btn-sm">Small</button>
    </div>
  </div>

  <div class="card">
    <h2>Sizes</h2>
    <div class="btn-row">
      <button class="btn btn-purple btn-sm">Small</button>
      <button class="btn btn-purple btn-md">Medium</button>
      <button class="btn btn-purple btn-lg">Large</button>
    </div>
  </div>

  <div class="card">
    <h2>Icon + Label</h2>
    <div class="btn-row">
      <button class="btn btn-blue btn-md">
        <span class="icon">^</span> Upload
      </button>
      <button class="btn btn-pink btn-md">
        <span class="icon">@</span> Send
      </button>
      <button class="btn btn-mint btn-md">
        <span class="icon">*</span> Confirm
      </button>
      <button class="btn btn-peach btn-md">
        <span class="icon">/</span> Edit
      </button>
      <button class="btn btn-red btn-md">
        <span class="icon">x</span> Remove
      </button>
    </div>
  </div>

</div>

<div style="text-align:center; margin-top:40px;">
  <a class="back-link" href="../index.html">Back to Index</a>
</div>

</body>
</html>
