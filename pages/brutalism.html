<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brutalism UI Style</title>
  <link rel="stylesheet" href="../styles/brutalism.css">
</head>
<body>

<div class="page-header">
  <h1>Brutalism</h1>
  <p>Raw, unpolished, intentionally ugly — and bold</p>
</div>

<div class="showcase">

  <div class="card">
    <h2>Primary Actions</h2>
    <div class="btn-row">
      <button class="btn btn-black btn-md">Save</button>
      <button class="btn btn-white btn-md">Cancel</button>
      <button class="btn btn-red btn-md">Destroy</button>
      <button class="btn btn-yellow btn-md">Warning</button>
    </div>
  </div>

  <div class="card">
    <h2>Add Card Variants</h2>
    <div class="btn-row">
      <button class="btn btn-black btn-lg">
        [+] ADD CARD
      </button>
      <button class="btn btn-yellow btn-md">
        [+] ADD CARD
      </button>
      <button class="btn btn-ghost btn-md">
        [+] ADD CARD
      </button>
      <button class="btn btn-inverted btn-md">
        + NEW CARD
      </button>
    </div>
  </div>

  <div class="card">
    <h2>Color Fills</h2>
    <div class="btn-row">
      <button class="btn btn-black btn-md">Black</button>
      <button class="btn btn-red btn-md">Red</button>
      <button class="btn btn-yellow btn-md">Yellow</button>
      <button class="btn btn-green btn-md">Green</button>
      <button class="btn btn-cyan btn-md">Cyan</button>
    </div>
  </div>

  <div class="card">
    <h2>Special</h2>
    <div class="btn-row">
      <button class="btn btn-stripe btn-md">Stripe</button>
      <button class="btn btn-inverted btn-md">Anton Bold</button>
      <button class="btn btn-ghost btn-md">Dashed</button>
    </div>
  </div>

  <div class="card">
    <h2>Sizes</h2>
    <div class="btn-row">
      <button class="btn btn-black btn-sm">Small</button>
      <button class="btn btn-black btn-md">Medium</button>
      <button class="btn btn-black btn-lg">Large</button>
    </div>
  </div>

  <div class="card">
    <h2>Icon + Label</h2>
    <div class="btn-row">
      <button class="btn btn-black btn-md">[^] Upload</button>
      <button class="btn btn-white btn-md">[v] Download</button>
      <button class="btn btn-yellow btn-md">[@] Send</button>
      <button class="btn btn-white btn-md">[/] Edit</button>
      <button class="btn btn-red btn-md">[x] Kill</button>
    </div>
  </div>

</div>

<div style="text-align:center; margin-top:40px; padding-bottom:40px;">
  <a class="back-link" href="../index.html">Back to Index</a>
</div>

</body>
</html>
