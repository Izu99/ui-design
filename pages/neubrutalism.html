<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neubrutalism UI Style</title>
  <link rel="stylesheet" href="../styles/neubrutalism.css">
</head>
<body>

<div class="page-header">
  <h1>Neubrutalism</h1>
  <p>Bold borders, offset shadows, raw energy</p>
</div>

<div class="showcase">

  <div class="card">
    <h2>Primary Actions</h2>
    <div class="btn-row">
      <button class="btn btn-yellow btn-md">Save</button>
      <button class="btn btn-blue btn-md">Explore</button>
      <button class="btn btn-green btn-md">Confirm</button>
      <button class="btn btn-red btn-md">Delete</button>
      <button class="btn btn-black btn-md">Settings</button>
    </div>
  </div>

  <div class="card">
    <h2>Add Card Variants</h2>
    <div class="btn-row">
      <button class="btn btn-add-chunky">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-pink btn-md">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-white btn-md">
        <span class="icon">+</span> Add Card
      </button>
      <button class="btn btn-sticker btn-md">
        <span class="icon">+</span> Add Card
      </button>
    </div>
  </div>

  <div class="card">
    <h2>Color Palette</h2>
    <div class="btn-row">
      <button class="btn btn-yellow btn-md">Yellow</button>
      <button class="btn btn-pink btn-md">Pink</button>
      <button class="btn btn-green btn-md">Green</button>
      <button class="btn btn-blue btn-md">Blue</button>
      <button class="btn btn-orange btn-md">Orange</button>
      <button class="btn btn-red btn-md">Red</button>
    </div>
  </div>

  <div class="card">
    <h2>Sizes</h2>
    <div class="btn-row">
      <button class="btn btn-yellow btn-sm">Small</button>
      <button class="btn btn-yellow btn-md">Medium</button>
      <button class="btn btn-yellow btn-lg">Large</button>
    </div>
  </div>

  <div class="card">
    <h2>Icon + Label</h2>
    <div class="btn-row">
      <button class="btn btn-black btn-md">
        <span class="icon">^</span> Upload
      </button>
      <button class="btn btn-blue btn-md">
        <span class="icon">v</span> Download
      </button>
      <button class="btn btn-green btn-md">
        <span class="icon">@</span> Send
      </button>
      <button class="btn btn-white btn-md">
        <span class="icon">/</span> Edit
      </button>
      <button class="btn btn-red btn-md">
        <span class="icon">x</span> Remove
      </button>
    </div>
  </div>

  <div class="card">
    <h2>Sticker / Pill</h2>
    <div class="btn-row">
      <button class="btn btn-sticker btn-md">Done</button>
      <button class="btn btn-sticker btn-md" style="background:#ff6b9d;color:#fff;">Remove</button>
      <button class="btn btn-sticker btn-md" style="background:#60a5fa;">Star</button>
      <button class="btn btn-sticker btn-sm">Tag</button>
      <button class="btn btn-sticker btn-sm" style="background:#4ade80;">Active</button>
    </div>
  </div>

</div>

<div style="text-align:center; margin-top:40px;">
  <a class="back-link" href="../index.html">Back to Index</a>
</div>

</body>
</html>
